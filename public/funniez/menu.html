<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funniez !!</title>
  <link rel="icon" type="image/x-icon" href="/archives/ico/funniez.ico">
  <meta name="robots" content="noindex">

  <style>
    body {
      background: black;
      overflow: hidden;
      margin-left: auto;
      width: 900px;
      position: relative;
      display: grid;
      justify-items: center;
      margin-right: auto;
    }

    main {
      background: url('/archives/assets/funniez_bg.webp') no-repeat;
      position: absolute;
      width: 1475px;
      height: 748px;
      background-size: 100%;
      background-position: center;
      margin: 0px;
    }

    #selection {
      width: fit-content;
      height: fit-content;
      display: flex;
      flex-direction: row;
      position: absolute;
      top: 55px;
      left: 310px;
    }

    #selection .selector {
      width: 205px;
      transform: rotateX(0deg) rotateY(24deg);
      transform-style: preserve-3d;
      transition: all 0.1s;
    }

    .selector a {
      perspective: 255px;
    }

    .selector img {
      width: auto;
      height: 80%;
      object-fit: contain;
      transition: transform 0.5s, width 0.5s, height 0.5s, margin-top 0.5s;
      transform: rotateX(0deg) rotateY(12deg);
      transform-style: preserve-3d;
    }

    .selector:hover {
      margin-right: 55px;
      margin-left: 20px;
    }

    .selector:hover img {
      transform: rotateX(0deg) rotateY(10deg);
      transform: rotateX(0deg) rotateY(0deg);
      transform-style: preserve-3d;
    }

    #exit {
      position: absolute;
      width: 90px;
      height: 89px;
      bottom: 50px;
      left: 0px;
      border-radius: 50px;
      border: 4px solid #32245f;
      background: transparent;
    }

    #exit:hover {
      border: 4px solid #8e7cc6;
    }
  </style>

</head>

<body>

  <main>
    <div id="selection">

      <div class="selector">
        <a href="/webring/sapphicring.html"><img src="/archives/assets/sapphicring.png" alt="Sapphic webring"></a>
      </div>


      <div class="selector">
        <a href="/webring/sapphicring.html"><img src="/archives/assets/treeofwisdom.png" alt="Tree of wisdom"></a>
      </div>


      <div class="selector">
        <a href="https://plantsvszombiez.neocities.org/"><img src="/archives/assets/pvzring.png"
            alt="Plants vs Zombies webring"></a>
      </div>


      <div class="selector">
        <a href="/funniez/waybackmachine.html"><img src="/archives/assets/waybackmachine.png"
            alt="Not a wayback machine"></a>
      </div>

    </div>
    <a id="exit" href='/mainpage.html'></a>
  </main>
</body>

</html>
