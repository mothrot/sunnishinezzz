<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree of wisdom</title>
  <link rel="icon" type="image/x-icon" href="/archives/ico/sprout.gif">
  <meta name="robots" content="noindex">


  <style>
    body {
      background: url('/archives/assets/treeofwisdom_bg.webp') no-repeat;
      background-size: cover;
      position: relative;
      display: flex;
      margin: 0px;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      height: 100vh;
    }

    #tree {
      height: 101vh;
      margin: 0px;
    }

    main {
      position: relative;
    }

    #speechbubble {
      background: url('/archives/assets/speech_bubble.png') no-repeat;
      background-size: cover;
      position: absolute;
      width: 220px;
      height: 140px;
      left: 55%;
      top: 15%;
      padding: 5px;
      text-align: center;
      transform: translate(0px, 0%);
      font-size: 1.2em;
    }

    #outputDiv {
      margin: 36px;
    }

    #questionBox {
      position: absolute;
      top: 70%;
      left: 38%;
      transform: translate(0px, 0%);
      width: 360px;
      height: 30px;
      max-height: 50px;
    }

    #button {
      position: absolute;
      top: 80%;
      left: 43%;
      transform: translate(0px, 0%);
    }

    #button:hover {
      cursor: pointer;
      filter: brightness(120%);
    }
  </style>

  <script>
    function generateAnswer() {

      responses = [
        'It is certain',
        'It is decidedly so',
        'Without a doubt',
        'Yes definitely',
        'You may rely on it',
        'As I see it, yes',
        'Most likely',
        'Outlook good',
        'Yes',
        'Ask again later',
        'My reply is no',
        'No',
        'Very doubtful',
        'Not sure',
        'Dont ask me that',
        'Well...',
        'Maybe not',
      ];
      response = responses[Math.floor(Math.random() * responses.length)];
      document.getElementById('outputDiv').innerHTML = response;
    }

    function clearInput() {
      document.getElementById("questionBox").value = "";
    }

    function validateInput() {
      var x = document.getElementById("questionBox").value;
      if (x == "") {
        alert("input can't be empty");
        return false;
      } else {
        generateAnswer();
        clearInput();
      }
    }

  </script>

</head>

<body>
  <iframe width="0" height="0" src="//www.youtube.com/embed/rYXHGo1wpL8?autoplay=1&loop=1&playlist=rYXHGo1wpL8"
    frameborder="0" allowfullscreen></iframe>

  <main>
    <div id="speechbubble">
      <div id="outputDiv"> Ask me a question, and I will answer </div>
    </div>
    <img id="tree" src="/archives/assets/treeofwisdom_.png">

    <img id="button" src="/archives/assets/att_b.png" onclick="validateInput()">

    <input type="text" id="questionBox" size=100 value=''>

  </main>
</body>

</html>
